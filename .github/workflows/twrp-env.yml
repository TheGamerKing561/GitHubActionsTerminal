name: Environment for building TWRP

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Manifest Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
        - twrp-14.1
        - twrp-14
        - twrp-12.1
        - twrp-11
        - twrp-10.0-deprecated
        - twrp-9.0
        - twrp-8.1
        - twrp-8.1-macOS
        - twrp-7.1
        - twrp-6.0
        - twrp-5.1
        - twrp-4.4-deprecated
      
      RECOVERY_INSTALLER:
        description: 'Include recovery installer zip (A\B devices only)'
        type: boolean
        required: true
        default: true

jobs:
  build:
    name: Build TWRP by ${{ github.actor }}
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
    - name: Check Out
      uses: actions/checkout@v4
      
    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main
      
    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12

    - name: Check Manifest Branch
      run: |
        if [ "${{ inputs.MANIFEST_BRANCH }}" == "twrp-11" ] || [ "${{ inputs.MANIFEST_BRANCH }}" == "twrp-12.1" ] || [ "${{ inputs.MANIFEST_BRANCH }}" == "twrp-14" ]; then
            echo "MANIFEST=https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git" >> $GITHUB_ENV
            echo "CHECK_LEGACY_BRANCH=false" >> $GITHUB_ENV
        else
            echo "MANIFEST=https://github.com/mlm-games/platform_manifest_twrp_omni.git" >> $GITHUB_ENV
            echo "CHECK_LEGACY_BRANCH=true" >> $GITHUB_ENV
        fi

    - name: Prepare the environment
      run: |
        sudo apt update
        sudo apt -y upgrade
        sudo add-apt-repository universe
        sudo apt -y install python2
        sudo ln -sf /usr/bin/python2 /usr/bin/python
        sudo apt -y install gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib \
        libc6-dev lib32ncurses5-dev x11proto-core-dev libx11-dev tree lib32z-dev \
        libgl1-mesa-dev libxml2-utils xsltproc bc ccache lib32readline-dev \
        lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libwxgtk3.0-gtk3-dev \
        libxml2 lzop pngcrush schedtool squashfs-tools imagemagick libbz2-dev \
        lzma ncftp qemu-user-static libstdc++-10-dev libtinfo5 libgflags-dev libncurses5
        
    - name: Install OpenJDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '8'

    - name: Install Git-Repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize Repo
      run: |
        mkdir android-recovery
        cd android-recovery
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
        repo init --depth=1 -u ${{ env.MANIFEST }} -b ${{ inputs.MANIFEST_BRANCH }}

    - name: Repo Sync
      run: |
        cd android-recovery
        repo sync -j$(nproc --all) --force-sync

    - name: Include Recovery Installer
      if: inputs.RECOVERY_INSTALLER == true && inputs.MANIFEST_BRANCH != 'twrp-6.0' && inputs.BUILD_TARGET != 'vendorboot'
      run: |
        case ${{ inputs.MANIFEST_BRANCH }} in
          twrp-7.1)
            patchNum=5080
            ;;
          twrp-8.1)
            patchNum=5079
            ;;
          twrp-9.0)
            patchNum=5037
            ;;
          twrp-11)
            patchNum=4964
            ;;
          twrp-12.1)
            patchNum=5445
            ;;
          twrp-14|twrp-14.1)
            patchNum=5445
            ;;
        esac

        cd android-recovery
        source build/envsetup.sh

        if [ -n "$patchNum" ]; then
          repopick -g https://gerrit.twrp.me ${patchNum}

          echo "Cloning TWRP A/B Installer backend from osm0sis.."
          git clone https://github.com/osm0sis/twrp_abtemplate bootable/recovery/installer
        fi
      id: recoveryinstaller
      continue-on-error: true

    - name: Installing python2 for legacy builds
      if: env.CHECK_LEGACY_BRANCH == 'true'
      run: |
        sudo add-apt-repository ppa:deadsnakes/ppa -y
        sudo apt-get update
        sudo apt-get install python2.7 -y
        sudo ln -sf /usr/bin/python2.7 /usr/bin/python
        sudo ln -sf /usr/bin/python2.7 /usr/bin/python2
        python --version

    - name: Setup tmate session
      uses: mxschmitt/action-tmate@v3
